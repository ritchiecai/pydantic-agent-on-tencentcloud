<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
    <marker id="arrBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
    <marker id="arrOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/>
    </marker>
  </defs>
  <rect width="1000" height="560" fill="#ffffff"/>
  <text x="500" y="36" font-size="20" font-weight="700" text-anchor="middle" fill="#111827">智能数据分析助手 · 腾讯云 AI 产品集成架构</text>
  <text x="500" y="58" font-size="12" text-anchor="middle" fill="#6b7280">pydantic-ai Agent + Agent Runtime (代码沙箱) + Agent Memory (跨会话记忆)</text>
  <rect x="40" y="240" width="140" height="70" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="110" y="270" font-size="14" font-weight="600" text-anchor="middle" fill="#3730a3">Client</text>
  <text x="110" y="290" font-size="11" text-anchor="middle" fill="#4338ca">POST /chat</text>
  <text x="110" y="304" font-size="11" text-anchor="middle" fill="#4338ca">user_id + session_id</text>
  <rect x="240" y="220" width="200" height="110" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="1.8"/>
  <text x="340" y="250" font-size="14" font-weight="700" text-anchor="middle" fill="#9a3412">app/main.py 编排</text>
  <text x="340" y="272" font-size="11" text-anchor="middle" fill="#9a3412">① 构造集成客户端</text>
  <text x="340" y="288" font-size="11" text-anchor="middle" fill="#9a3412">② 检索记忆 → 注入</text>
  <text x="340" y="304" font-size="11" text-anchor="middle" fill="#9a3412">③ agent.run(deps)</text>
  <text x="340" y="320" font-size="11" text-anchor="middle" fill="#9a3412">④ 写回记忆</text>
  <rect x="500" y="220" width="200" height="110" rx="12" fill="#ecfeff" stroke="#0891b2" stroke-width="1.8"/>
  <text x="600" y="248" font-size="14" font-weight="700" text-anchor="middle" fill="#155e75">pydantic-ai Agent</text>
  <text x="600" y="268" font-size="11" text-anchor="middle" fill="#155e75">数据分析助手 persona</text>
  <text x="600" y="284" font-size="11" text-anchor="middle" fill="#155e75">@agent.instructions</text>
  <text x="600" y="298" font-size="11" text-anchor="middle" fill="#155e75">  → 注入 memory_context</text>
  <text x="600" y="316" font-size="11" text-anchor="middle" fill="#155e75">@agent.tool run_python</text>
  <rect x="760" y="100" width="200" height="100" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
  <text x="860" y="128" font-size="13" font-weight="700" text-anchor="middle" fill="#1e3a8a">腾讯云 Agent Runtime</text>
  <text x="860" y="146" font-size="11" text-anchor="middle" fill="#1e3a8a">代码沙箱 (E2B 兼容)</text>
  <text x="860" y="166" font-size="10" text-anchor="middle" fill="#1d4ed8">Sandbox.create() →</text>
  <text x="860" y="180" font-size="10" text-anchor="middle" fill="#1d4ed8">run_code() → kill()</text>
  <rect x="760" y="370" width="200" height="100" rx="12" fill="#ecfdf5" stroke="#059669" stroke-width="1.8"/>
  <text x="860" y="398" font-size="13" font-weight="700" text-anchor="middle" fill="#064e3b">腾讯云 Agent Memory</text>
  <text x="860" y="416" font-size="11" text-anchor="middle" fill="#064e3b">跨会话四层金字塔记忆</text>
  <text x="860" y="436" font-size="10" text-anchor="middle" fill="#047857">retrieve(user, session, q)</text>
  <text x="860" y="450" font-size="10" text-anchor="middle" fill="#047857">write(user, session, c)</text>
  <rect x="240" y="380" width="460" height="90" rx="10" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="470" y="402" font-size="12" font-weight="700" text-anchor="middle" fill="#374151">app/integrations/（可插拔集成适配层）</text>
  <rect x="262" y="412" width="135" height="46" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.2"/>
  <text x="329" y="430" font-size="11" font-weight="600" text-anchor="middle" fill="#1e3a8a">sandbox.py</text>
  <text x="329" y="446" font-size="10" text-anchor="middle" fill="#1e40af">SandboxExecutor</text>
  <rect x="405" y="412" width="135" height="46" rx="8" fill="#ffffff" stroke="#059669" stroke-width="1.2"/>
  <text x="472" y="430" font-size="11" font-weight="600" text-anchor="middle" fill="#064e3b">memory.py</text>
  <text x="472" y="446" font-size="10" text-anchor="middle" fill="#047857">MemoryClient</text>
  <rect x="548" y="412" width="135" height="46" rx="8" fill="#ffffff" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="3,3"/>
  <text x="615" y="430" font-size="11" font-weight="600" text-anchor="middle" fill="#374151">future/*.py</text>
  <text x="615" y="446" font-size="10" text-anchor="middle" fill="#6b7280">浏览器/知识库/Skills</text>
  <path d="M 180,275 L 235,275" stroke="#374151" stroke-width="1.6" fill="none" marker-end="url(#arr)"/>
  <path d="M 440,275 L 495,275" stroke="#374151" stroke-width="1.6" fill="none" marker-end="url(#arr)"/>
  <path d="M 700,240 C 740,200 750,165 755,150" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrBlue)"/>
  <text x="722" y="195" font-size="10" fill="#1d4ed8">run_python(code)</text>
  <path d="M 755,175 C 730,205 720,225 700,255" stroke="#2563eb" stroke-width="2" fill="none" stroke-dasharray="4,3" marker-end="url(#arrBlue)"/>
  <text x="678" y="220" font-size="10" fill="#1d4ed8">stdout / error</text>
  <path d="M 380,330 C 540,380 700,400 760,418" stroke="#059669" stroke-width="2" fill="none" marker-end="url(#arrGreen)"/>
  <text x="540" y="368" font-size="10" fill="#047857">retrieve</text>
  <path d="M 760,440 C 660,455 500,455 380,335" stroke="#059669" stroke-width="2" fill="none" stroke-dasharray="4,3" marker-end="url(#arrGreen)"/>
  <text x="540" y="500" font-size="10" fill="#047857">memory_context</text>
  <path d="M 405,335 C 600,430 740,455 800,470" stroke="#ea580c" stroke-width="1.8" stroke-dasharray="5,3" fill="none" marker-end="url(#arrOrange)"/>
  <text x="650" y="480" font-size="10" fill="#c2410c">write 沉淀</text>
  <rect x="40" y="490" width="920" height="50" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
  <line x1="60" y1="510" x2="100" y2="510" stroke="#2563eb" stroke-width="2"/>
  <text x="108" y="514" font-size="11" fill="#374151">沙箱执行（主请求路径）</text>
  <line x1="280" y1="510" x2="320" y2="510" stroke="#059669" stroke-width="2"/>
  <text x="328" y="514" font-size="11" fill="#374151">记忆检索（读）</text>
  <line x1="460" y1="510" x2="500" y2="510" stroke="#ea580c" stroke-width="1.8" stroke-dasharray="5,3"/>
  <text x="508" y="514" font-size="11" fill="#374151">记忆写回（沉淀）</text>
  <line x1="640" y1="510" x2="680" y2="510" stroke="#374151" stroke-width="1.6"/>
  <text x="688" y="514" font-size="11" fill="#374151">HTTP / 内部调用</text>
  <text x="60" y="530" font-size="10" fill="#6b7280">所有集成客户端在 /chat 请求期按需构造；缺凭证 fail-fast，记忆不可用时安全降级，沙箱必备否则拒绝执行。</text>
</svg>